lab:
  title: "Lab-12 - DHCP Snooping and Dynamic ARP Inspection (Ch12 Vol2)"
  description: >-
    CCNA 200-301 v1.1 — Exam Topic: 5.7
    Covers DHCP Snooping (trusted/untrusted ports, rogue DHCP server blocking,
    rate limiting, binding table) and Dynamic ARP Inspection (DAI logic,
    gratuitous ARP attack prevention, optional DAI message checks).
  notes: |
    ============================================================
    LAB-12: DHCP SNOOPING AND DYNAMIC ARP INSPECTION
    CCNA 200-301 v1.1 Exam Topic: 5.7
    ============================================================

    TOPOLOGY DIAGRAM:

                          [R1]
                       10.1.1.1/24
                    (DHCP Server + Gateway)
                           |
                        Gi0/0 ← TRUSTED port
                           |
                          [SW1]
                    /      |       \
                 Gi0/1   Gi0/2   Gi0/3
                   |       |        |
                [PC1]   [PC2]   [ROGUE]
             10.1.1.10  10.1.1.20  10.1.1.99
           (Tiny Linux) (Tiny Linux) (Tiny Linux)

    ============================================================
    SW1 PORT ROLE SUMMARY:
      Gi0/0  → R1     (Legitimate DHCP server + gateway — TRUSTED)
      Gi0/1  → PC1    (DHCP client — untrusted)
      Gi0/2  → PC2    (DHCP client — untrusted)
      Gi0/3  → ROGUE  (Adversary: rogue DHCP + ARP attacker — untrusted)

    IP ADDRESSES (preconfigured via Tiny Core Linux boot script):
      R1     : 10.1.1.1/24  (GigabitEthernet0/0)
      PC1    : 10.1.1.10/24 (eth0) — static base; release to use DHCP
      PC2    : 10.1.1.20/24 (eth0) — static base; release to use DHCP
      ROGUE  : 10.1.1.99/24 (eth0)

    R1 DHCP POOL (CCNA-LAB):
      Network        : 10.1.1.0/24
      Default router : 10.1.1.1
      DNS server     : 8.8.8.8
      Lease          : 1 day
      Excluded       : 10.1.1.1–10.1.1.9 and 10.1.1.99

    BASE STATE (before tasks):
      SW1: All ports in access mode — NO DHCP snooping or DAI configured
      R1:  DHCP pool ready; Gi0/0 IP configured
      PC1: Static 10.1.1.10/24 — udhcpc available to request DHCP
      PC2: Static 10.1.1.20/24 — udhcpc available to request DHCP
      ROGUE: Static 10.1.1.99/24

    TINY CORE LINUX COMMANDS REFERENCE:
      Check IP         : ifconfig eth0
      Set static IP    : ifconfig eth0 <ip> netmask <mask> up
      Release IP       : ifconfig eth0 0.0.0.0
      Request DHCP     : udhcpc -i eth0
      Test connection  : ping <ip>
      Show ARP table   : arp -n

    TASKS OVERVIEW:
      Task 1:  Verify base connectivity before DHCP snooping
      Task 2:  Enable DHCP snooping globally and on VLAN 1
      Task 3:  Configure trusted port (Gi0/0 → R1)
      Task 4:  Populate the DHCP snooping binding table (PC1 and PC2 use DHCP)
      Task 5:  Verify the DHCP snooping binding table
      Task 6:  Configure rate limiting on untrusted ports
      Task 7:  Configure Dynamic ARP Inspection on VLAN 1
      Task 8:  Configure trusted port for DAI (Gi0/0 → R1)
      Task 9:  Configure optional DAI message checks
      Task 10: Full verification using all show commands
    ============================================================
  version: "0.1.0"

nodes:

  - id: n0
    label: SW1
    node_definition: iosvl2
    x: 400
    y: 250
    image_definition: null
    ram: null
    cpus: null
    cpu_limit: null
    data_volume: null
    boot_disk_size: null
    hide_links: false
    tags: []
    interfaces:
      - id: i0
        label: Loopback0
        type: loopback
      - id: i1
        label: GigabitEthernet0/0
        type: physical
      - id: i2
        label: GigabitEthernet0/1
        type: physical
      - id: i3
        label: GigabitEthernet0/2
        type: physical
      - id: i4
        label: GigabitEthernet0/3
        type: physical
    configuration: |
      hostname SW1
      !
      no ip domain-lookup
      !
      interface Loopback0
       no shutdown
      !
      interface GigabitEthernet0/0
       description To-R1-Trusted
       switchport mode access
       negotiation auto
      !
      interface GigabitEthernet0/1
       description To-PC1
       switchport mode access
       negotiation auto
      !
      interface GigabitEthernet0/2
       description To-PC2
       switchport mode access
       negotiation auto
      !
      interface GigabitEthernet0/3
       description To-ROGUE
       switchport mode access
       negotiation auto
      !
      line con 0
       logging synchronous
      !
      end

  - id: n1
    label: R1
    node_definition: iosv
    x: 400
    y: 50
    image_definition: null
    ram: null
    cpus: null
    cpu_limit: null
    data_volume: null
    boot_disk_size: null
    hide_links: false
    tags: []
    interfaces:
      - id: i0
        label: Loopback0
        type: loopback
      - id: i1
        label: GigabitEthernet0/0
        type: physical
    configuration: |
      hostname R1
      !
      no ip domain-lookup
      !
      ip dhcp excluded-address 10.1.1.1 10.1.1.9
      ip dhcp excluded-address 10.1.1.99
      !
      ip dhcp pool CCNA-LAB
       network 10.1.1.0 255.255.255.0
       default-router 10.1.1.1
       dns-server 8.8.8.8
       lease 1
      !
      interface Loopback0
       no shutdown
      !
      interface GigabitEthernet0/0
       description To-SW1-Trusted
       ip address 10.1.1.1 255.255.255.0
       no shutdown
      !
      line con 0
       logging synchronous
      !
      end

  - id: n2
    label: PC1
    node_definition: server
    x: 100
    y: 480
    image_definition: null
    ram: null
    cpus: null
    cpu_limit: null
    data_volume: null
    boot_disk_size: null
    hide_links: false
    tags: []
    interfaces:
      - id: i0
        label: eth0
        type: physical
    configuration: |
      hostname PC1
      ifconfig eth0 10.1.1.10 netmask 255.255.255.0 up
      route add default gw 10.1.1.1

  - id: n3
    label: PC2
    node_definition: server
    x: 400
    y: 480
    image_definition: null
    ram: null
    cpus: null
    cpu_limit: null
    data_volume: null
    boot_disk_size: null
    hide_links: false
    tags: []
    interfaces:
      - id: i0
        label: eth0
        type: physical
    configuration: |
      hostname PC2
      ifconfig eth0 10.1.1.20 netmask 255.255.255.0 up
      route add default gw 10.1.1.1

  - id: n4
    label: ROGUE
    node_definition: server
    x: 700
    y: 480
    image_definition: null
    ram: null
    cpus: null
    cpu_limit: null
    data_volume: null
    boot_disk_size: null
    hide_links: false
    tags: []
    interfaces:
      - id: i0
        label: eth0
        type: physical
    configuration: |
      hostname ROGUE
      ifconfig eth0 10.1.1.99 netmask 255.255.255.0 up
      route add default gw 10.1.1.1

links:

  # SW1 Gi0/0 <-> R1 GigabitEthernet0/0  (TRUSTED uplink)
  - id: l0
    n1: n0
    i1: i1
    n2: n1
    i2: i1

  # SW1 Gi0/1 <-> PC1 eth0
  - id: l1
    n1: n0
    i1: i2
    n2: n2
    i2: i0

  # SW1 Gi0/2 <-> PC2 eth0
  - id: l2
    n1: n0
    i1: i3
    n2: n3
    i2: i0

  # SW1 Gi0/3 <-> ROGUE eth0
  - id: l3
    n1: n0
    i1: i4
    n2: n4
    i2: i0
