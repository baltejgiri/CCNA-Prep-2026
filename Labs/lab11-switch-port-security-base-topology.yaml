        type: physical
      - id: i3
        label: GigabitEthernet0/2
        type: physical
      - id: i4
        label: GigabitEthernet0/3
        type: physical
    configuration: |
      hostname SW1
      !
      no ip domain-lookup
      !
      interface Loopback0
       no shutdown
      !
      interface GigabitEthernet0/0
       description To-UNS1-Hub
       switchport mode access
       no shutdown
      !
      interface GigabitEthernet0/1
       description To-PC1
       switchport mode access
       no shutdown
      !
      interface GigabitEthernet0/2
       description To-PC2
       switchport mode access
       no shutdown
      !
