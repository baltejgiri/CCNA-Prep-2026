lab:
  title: "Lab-11 - Implementing Switch Port Security (Ch11 Vol2)"
  description: >-
    Base topology for Ch11 Vol2 - Implementing Switch Port Security.
    Covers CCNA 200-301 v1.1 exam topic 5.7: Configure and verify Layer 2
    security features (port security). All ports pre-configured in access mode.
    No port security applied — students configure per task instructions.
  notes: |
    ============================================================
    LAB-11: IMPLEMENTING SWITCH PORT SECURITY
    CCNA 200-301 v1.1 Exam Topic: 5.7
    ============================================================

    TOPOLOGY DIAGRAM:

      [PC1] ------Gi0/1------ [SW1] ------Gi0/2------ [PC2]
      10.1.1.10/24              |                      10.1.1.20/24
                               Gi0/3
                                |
                              [PC3]  10.1.1.30/24
                                |
                               Gi0/0
                                |
                            [UNS1-Hub]
                           /          \
                        [PC4]        [ROGUE]
                     10.1.1.40/24   10.1.1.99/24

    ============================================================
    SW1 PORT ROLE SUMMARY:
      Gi0/0  → UNS1 (hub with PC4 + ROGUE behind it)
      Gi0/1  → PC1  (sticky MAC task, shutdown mode)
      Gi0/2  → PC2  (static MAC task, restrict mode)
      Gi0/3  → PC3  (protect mode task)

    VIOLATION MODE ASSIGNMENT (students configure):
      Gi0/0  — shutdown mode   (multi-device violation + errdisable recovery)
      Gi0/1  — shutdown mode   (sticky MAC, SECURE-UP demonstration)
      Gi0/2  — restrict mode   (static MAC)
      Gi0/3  — protect mode    (static MAC with mismatched device)

    IP ADDRESSES:
      PC1    : 10.1.1.10/24
      PC2    : 10.1.1.20/24
      PC3    : 10.1.1.30/24
      PC4    : 10.1.1.40/24
      ROGUE  : 10.1.1.99/24

    BASE STATE (before tasks):
      - SW1 all ports set to switchport mode access
      - NO port security configured anywhere
      - UNS1 is an unmanaged hub — PC4 and ROGUE share SW1 Gi0/0

    TASKS OVERVIEW:
      Task 1: Configure access mode on all SW1 active ports
      Task 2: Configure sticky MAC + shutdown mode on Gi0/1 (PC1)
      Task 3: Configure static MAC + restrict mode on Gi0/2 (PC2)
      Task 4: Configure static MAC + protect mode on Gi0/3 (PC3)
      Task 5: Configure shutdown mode on Gi0/0, trigger and observe violation
      Task 6: Configure and test errdisable recovery on Gi0/0
      Task 7: Secure all unused ports on SW1
      Task 8: Full verification using all show commands
    ============================================================
  version: "0.1.0"

nodes:

  - id: n0
    label: SW1
    node_definition: iosvl2
    x: 200
    y: 300
    image_definition: null
    ram: null
    cpus: null
    cpu_limit: null
    data_volume: null
    boot_disk_size: null
    hide_links: false
    tags: []
    interfaces:
      - id: i0
        label: Loopback0
        type: loopback
      - id: i1
        label: GigabitEthernet0/0
        type: physical
      - id: i2
