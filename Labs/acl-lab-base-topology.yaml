lab:
  title: CCNA ACL Lab - Standard, Extended & Named ACLs (Base Topology)
  description: >-
    Base topology for ACL lab covering Standard, Extended and Named ACLs.
    Includes IP addressing on all nodes and static routing between networks.
    No ACL configuration - apply per lab exercise.
  notes: |
    Topology:
      [PC1-DeptA] -- [SW1-DeptA] -- G0/1 -- [R1] -- G0/3 -- [R2] -- G0/2 -- [SW3-Servers] -- [WebServer]
                                      |                                                          [FTPServer]
      [PC2-DeptB] -- [SW2-DeptB] -- G0/2 /

    Networks:
      192.168.1.0/24  Dept-A
      192.168.2.0/24  Dept-B
      10.0.0.0/30     WAN (R1 <-> R2)
      10.1.1.0/24     Server Network
  version: 0.1.0

nodes:

  - id: n0
    label: R1
    node_definition: iosv
    x: 100
    y: 200
    image_definition: null
    ram: null
    cpus: null
    cpu_limit: null
    data_volume: null
    boot_disk_size: null
    hide_links: false
    tags: []
    interfaces:
      - id: i0
        label: Loopback0
        type: loopback
      - id: i1
        label: GigabitEthernet0/1
        type: physical
      - id: i2
        label: GigabitEthernet0/2
        type: physical
      - id: i3
        label: GigabitEthernet0/3
        type: physical
    configuration: |
      hostname R1
      !
      no ip domain-lookup
      !
      interface Loopback0
       no shutdown
      !
      interface GigabitEthernet0/1
       description Dept-A Network
       ip address 192.168.1.1 255.255.255.0
       no shutdown
      !
      interface GigabitEthernet0/2
       description Dept-B Network
       ip address 192.168.2.1 255.255.255.0
       no shutdown
      !
      interface GigabitEthernet0/3
       description WAN to R2
       ip address 10.0.0.1 255.255.255.252
       no shutdown
      !
      ip route 10.1.1.0 255.255.255.0 10.0.0.2
      !
      end

  - id: n1
    label: R2
    node_definition: iosv
    x: 450
    y: 200
    image_definition: null
    ram: null
    cpus: null
    cpu_limit: null
    data_volume: null
    boot_disk_size: null
    hide_links: false
    tags: []
    interfaces:
      - id: i0
        label: Loopback0
        type: loopback
      - id: i1
        label: GigabitEthernet0/1
        type: physical
      - id: i2
        label: GigabitEthernet0/2
        type: physical
    configuration: |
      hostname R2
      !
      no ip domain-lookup
      !
      interface Loopback0
       no shutdown
      !
      interface GigabitEthernet0/1
       description WAN to R1
       ip address 10.0.0.2 255.255.255.252
       no shutdown
      !
      interface GigabitEthernet0/2
       description Server Network
       ip address 10.1.1.1 255.255.255.0
       no shutdown
      !
      ip route 192.168.1.0 255.255.255.0 10.0.0.1
      ip route 192.168.2.0 255.255.255.0 10.0.0.1
      !
      end

  - id: n2
    label: SW1-DeptA
    node_definition: unmanaged_switch
    x: -100
    y: 50
    image_definition: null
    ram: null
    cpus: null
    cpu_limit: null
    data_volume: null
    boot_disk_size: null
    hide_links: false
    tags: []
    interfaces:
      - id: i0
        label: port0
        type: physical
      - id: i1
        label: port1
        type: physical

  - id: n3
    label: SW2-DeptB
    node_definition: unmanaged_switch
    x: -100
    y: 350
    image_definition: null
    ram: null
    cpus: null
    cpu_limit: null
    data_volume: null
    boot_disk_size: null
    hide_links: false
    tags: []
    interfaces:
      - id: i0
        label: port0
        type: physical
      - id: i1
        label: port1
        type: physical

  - id: n4
    label: SW3-Servers
    node_definition: unmanaged_switch
    x: 680
    y: 200
    image_definition: null
    ram: null
    cpus: null
    cpu_limit: null
    data_volume: null
    boot_disk_size: null
    hide_links: false
    tags: []
    interfaces:
      - id: i0
        label: port0
        type: physical
      - id: i1
        label: port1
        type: physical
      - id: i2
        label: port2
        type: physical

  - id: n5
    label: PC1-DeptA
    node_definition: desktop
    x: -300
    y: 50
    image_definition: null
    ram: null
    cpus: null
    cpu_limit: null
    data_volume: null
    boot_disk_size: null
    hide_links: false
    tags: []
    interfaces:
      - id: i0
        label: eth0
        type: physical
    configuration: |
      #cloud-config
      hostname: PC1-DeptA
      manage_etc_hosts: true
      runcmd:
        - ip addr add 192.168.1.10/24 dev eth0
        - ip link set eth0 up
        - ip route add default via 192.168.1.1

  - id: n6
    label: PC2-DeptB
    node_definition: desktop
    x: -300
    y: 350
    image_definition: null
    ram: null
    cpus: null
    cpu_limit: null
    data_volume: null
    boot_disk_size: null
    hide_links: false
    tags: []
    interfaces:
      - id: i0
        label: eth0
        type: physical
    configuration: |
      #cloud-config
      hostname: PC2-DeptB
      manage_etc_hosts: true
      runcmd:
        - ip addr add 192.168.2.10/24 dev eth0
        - ip link set eth0 up
        - ip route add default via 192.168.2.1

  - id: n7
    label: WebServer
    node_definition: server
    x: 850
    y: 100
    image_definition: null
    ram: null
    cpus: null
    cpu_limit: null
    data_volume: null
    boot_disk_size: null
    hide_links: false
    tags: []
    interfaces:
      - id: i0
        label: eth0
        type: physical
    configuration: |
      #!/bin/sh
      ifconfig eth0 10.1.1.10 netmask 255.255.255.0 up
      route add default gw 10.1.1.1

  - id: n8
    label: FTPServer
    node_definition: server
    x: 850
    y: 310
    image_definition: null
    ram: null
    cpus: null
    cpu_limit: null
    data_volume: null
    boot_disk_size: null
    hide_links: false
    tags: []
    interfaces:
      - id: i0
        label: eth0
        type: physical
    configuration: |
      #!/bin/sh
      ifconfig eth0 10.1.1.20 netmask 255.255.255.0 up
      route add default gw 10.1.1.1

links:

  # PC1-DeptA eth0 <-> SW1-DeptA port0
  - id: l0
    n1: n5
    i1: i0
    n2: n2
    i2: i0

  # SW1-DeptA port1 <-> R1 GigabitEthernet0/1
  - id: l1
    n1: n2
    i1: i1
    n2: n0
    i2: i1

  # PC2-DeptB eth0 <-> SW2-DeptB port0
  - id: l2
    n1: n6
    i1: i0
    n2: n3
    i2: i0

  # SW2-DeptB port1 <-> R1 GigabitEthernet0/2
  - id: l3
    n1: n3
    i1: i1
    n2: n0
    i2: i2

  # R1 GigabitEthernet0/3 <-> R2 GigabitEthernet0/1
  - id: l4
    n1: n0
    i1: i3
    n2: n1
    i2: i1

  # R2 GigabitEthernet0/2 <-> SW3-Servers port0
  - id: l5
    n1: n1
    i1: i2
    n2: n4
    i2: i0

  # SW3-Servers port1 <-> WebServer eth0
  - id: l6
    n1: n4
    i1: i1
    n2: n7
    i2: i0

  # SW3-Servers port2 <-> FTPServer eth0
  - id: l7
    n1: n4
    i1: i2
    n2: n8
    i2: i0
