lab:
  title: "Lab-10 - Securing Network Devices (Ch10 Vol2)"
  description: >-
    Base topology for Ch10 Vol2 - Securing Network Devices.
    Covers CCNA 200-301 v1.1 topics: 1.1.c NGFW/IPS | 4.8 SSH | 5.3 Local Passwords.
    IP addressing pre-configured on all nodes. No SSH or password security applied yet
    - students configure these per task instructions.
  notes: |
    ============================================================
    LAB-10: SECURING NETWORK DEVICES
    CCNA 200-301 v1.1 Exam Topics
    ============================================================
    Topic 1.1.c - Next-Generation Firewalls and IPS
    Topic 4.8   - Configure SSH for Remote Access
    Topic 5.3   - Configure Device Access Control (Local Passwords)
    ============================================================

    TOPOLOGY DIAGRAM:
                           10.1.1.0/24 (Management/Inside)
      [Admin-PC]---eth0---[SW1-Mgmt]---G0/1---[R1]  10.1.1.1/24
      10.1.1.100/24           |
                             G0/2---[R2]  10.1.1.2/24
                              |
                             G0/3---[ASA1-inside G0/0]  10.1.1.254/24
                                     ASA1-outside G0/1  172.16.1.1/24
                                              |
                                         [OUTSIDE-R]    172.16.1.2/24

    NETWORKS:
      10.1.1.0/24   Management / Inside Network
      172.16.1.0/24 Outside / WAN Simulation

    NODE IPs:
      Admin-PC   : 10.1.1.100/24  (SSH client / Admin workstation)
      R1         : 10.1.1.1/24    (SSH + password config target)
      R2         : 10.1.1.2/24    (SSH + password config target)
      ASA1 inside: 10.1.1.254/24  (NGFW - inside interface)
      ASA1 outside: 172.16.1.1/24 (NGFW - outside interface)
      OUTSIDE-R  : 172.16.1.2/24  (Simulated external host)

    ============================================================
    BASE STATE (before tasks):
      - All IPs pre-configured and interfaces UP
      - NO SSH configured on R1 or R2
      - NO enable secret / local users configured
      - ASA1 basic interface config only
      - OUTSIDE-R has basic IP only
    ============================================================

    TASKS OVERVIEW:
      Task 1 (5.3): Configure enable secret & encrypted passwords on R1
      Task 2 (5.3): Configure local user accounts on R1 and R2
      Task 3 (4.8): Configure SSH version 2 on R1
      Task 4 (4.8): Configure SSH version 2 on R2
      Task 5 (4.8): Verify and test SSH from Admin-PC and OUTSIDE-R
      Task 6 (1.1.c): Explore ASA1 as a Next-Generation Firewall
    ============================================================
  version: "0.1.0"

nodes:

  - id: n0
    label: Admin-PC
    node_definition: desktop
    x: -300
    y: 300
    image_definition: null
    ram: null
    cpus: null
    cpu_limit: null
    data_volume: null
    boot_disk_size: null
    hide_links: false
    tags: []
    interfaces:
      - id: i0
        label: eth0
        type: physical
    configuration: |
      #cloud-config
      hostname: Admin-PC
      manage_etc_hosts: true
      runcmd:
        - ip addr add 10.1.1.100/24 dev eth0
        - ip link set eth0 up

  - id: n1
    label: SW1-Mgmt
    node_definition: unmanaged_switch
    x: -50
    y: 300
    image_definition: null
    ram: null
    cpus: null
    cpu_limit: null
    data_volume: null
    boot_disk_size: null
    hide_links: false
    tags: []
    interfaces:
      - id: i0
        label: port0
        type: physical
      - id: i1
        label: port1
        type: physical
      - id: i2
        label: port2
        type: physical
      - id: i3
        label: port3
        type: physical

  - id: n2
    label: R1
    node_definition: iosv
    x: 200
    y: 100
    image_definition: null
    ram: null
    cpus: null
    cpu_limit: null
    data_volume: null
    boot_disk_size: null
    hide_links: false
    tags: []
    interfaces:
      - id: i0
        label: Loopback0
        type: loopback
      - id: i1
        label: GigabitEthernet0/1
        type: physical
    configuration: |
      hostname R1
      !
      no ip domain-lookup
      ip domain-name ccna.lab
      !
      interface Loopback0
       no shutdown
      !
      interface GigabitEthernet0/1
       description Management-Network
       ip address 10.1.1.1 255.255.255.0
       no shutdown
      !
      line con 0
       logging synchronous
      !
      end

  - id: n3
    label: R2
    node_definition: iosv
    x: 200
    y: 500
    image_definition: null
    ram: null
    cpus: null
    cpu_limit: null
    data_volume: null
    boot_disk_size: null
    hide_links: false
    tags: []
    interfaces:
      - id: i0
        label: Loopback0
        type: loopback
      - id: i1
        label: GigabitEthernet0/1
        type: physical
    configuration: |
      hostname R2
      !
      no ip domain-lookup
      ip domain-name ccna.lab
      !
      interface Loopback0
       no shutdown
      !
      interface GigabitEthernet0/1
       description Management-Network
       ip address 10.1.1.2 255.255.255.0
       no shutdown
      !
      line con 0
       logging synchronous
      !
      end

  - id: n4
    label: ASA1
    node_definition: asav
    x: 450
    y: 300
    image_definition: null
    ram: null
    cpus: null
    cpu_limit: null
    data_volume: null
    boot_disk_size: null
    hide_links: false
    tags: []
    interfaces:
      - id: i0
        label: GigabitEthernet0/0
        type: physical
      - id: i1
        label: GigabitEthernet0/1
        type: physical
    configuration: |
      hostname ASA1
      !
      interface GigabitEthernet0/0
       nameif inside
       security-level 100
       ip address 10.1.1.254 255.255.255.0
       no shutdown
      !
      interface GigabitEthernet0/1
       nameif outside
       security-level 0
       ip address 172.16.1.1 255.255.255.0
       no shutdown
      !
      route outside 0.0.0.0 0.0.0.0 172.16.1.2 1
      !
      end

  - id: n5
    label: OUTSIDE-R
    node_definition: iosv
    x: 700
    y: 300
    image_definition: null
    ram: null
    cpus: null
    cpu_limit: null
    data_volume: null
    boot_disk_size: null
    hide_links: false
    tags: []
    interfaces:
      - id: i0
        label: Loopback0
        type: loopback
      - id: i1
        label: GigabitEthernet0/1
        type: physical
    configuration: |
      hostname OUTSIDE-R
      !
      no ip domain-lookup
      ip domain-name ccna.lab
      !
      interface Loopback0
       no shutdown
      !
      interface GigabitEthernet0/1
       description Outside-Link-to-ASA1
       ip address 172.16.1.2 255.255.255.0
       no shutdown
      !
      line con 0
       logging synchronous
      !
      end

links:

  # Admin-PC eth0 <-> SW1-Mgmt port0
  - id: l0
    n1: n0
    i1: i0
    n2: n1
    i2: i0

  # SW1-Mgmt port1 <-> R1 GigabitEthernet0/1
  - id: l1
    n1: n1
    i1: i1
    n2: n2
    i2: i1

  # SW1-Mgmt port2 <-> R2 GigabitEthernet0/1
  - id: l2
    n1: n1
    i1: i2
    n2: n3
    i2: i1

  # SW1-Mgmt port3 <-> ASA1 GigabitEthernet0/0 (inside)
  - id: l3
    n1: n1
    i1: i3
    n2: n4
    i2: i0

  # ASA1 GigabitEthernet0/1 (outside) <-> OUTSIDE-R GigabitEthernet0/1
  - id: l4
    n1: n4
    i1: i1
    n2: n5
    i2: i1
